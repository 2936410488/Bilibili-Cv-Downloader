[converter]
# 文集 ID。也可以在命令行里传入：python converter.py 702577 -c config.ini
readlist_id = 36436

# Cookie 文件路径。相对路径会按本配置文件所在目录解析；留空时默认读取 ./cookies.txt。
cookie_file =

# 也可以不使用 cookie_file，直接把 Cookie 按行填在这里。
# 如果 cookies 里有内容，会优先使用这里的内容。
cookies =
    # buvid3=...
    # b_nut=...
    # SESSDATA=...

# 另一种写法：也可以把 Cookie 逐项写到 [cookies] 段里。
#[cookies]
#buvid3 = ...
#b_nut = ...
#SESSDATA = ...
