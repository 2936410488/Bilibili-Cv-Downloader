[converter]
# 文集 ID。也可以在命令行里传入：python converter.py 702577 -c config.ini
readlist_id =

# Cookie 文件路径。相对路径会按本配置文件所在目录解析；留空时默认读取 ./cookies.txt。
cookie_file =

# 不推荐把登录 Cookie 直接写进配置文件；如确有需要，也支持下面的格式。
cookies =
    # buvid3=...
    # b_nut=...
    # SESSDATA=...

# 另一种写法：也可以把 Cookie 逐项写到 [cookies] 段里。
#[cookies]
#buvid3 = ...
#b_nut = ...
#SESSDATA = ...
