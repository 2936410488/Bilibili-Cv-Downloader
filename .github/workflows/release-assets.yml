name: Build release assets

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: 1.0.1

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: windows-latest
            asset_suffix: windows-x86_64

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install pyinstaller -r requirements.txt

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: |
          name="Bilibili-Cv-Downloader-${RELEASE_TAG}-${{ matrix.asset_suffix }}"
          pyinstaller --onefile --clean --name "$name" converter.py
          mkdir -p release-assets
          cp "dist/$name" "release-assets/$name"

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "Bilibili-Cv-Downloader-${env:RELEASE_TAG}-${{ matrix.asset_suffix }}"
          pyinstaller --onefile --clean --name $name converter.py
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist/$name.exe" "release-assets/$name.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          What's Changed

          - Remove article and image multithreading; fetch sequentially with a 1-second request interval.
          - Add config.ini support for readlist_id, cookie_file, inline cookies, and [cookies] entries.
          - Deduplicate repeated banner images before writing them into the EPUB.
          - Add Windows and Linux single-file executables to the release.
          - Update README with the new config workflow and crawler behavior.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          fi

          gh release upload "$RELEASE_TAG" release-assets/* --clobber
